<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nahala Games</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

/* logo */

.logo{
text-align:center;
padding:20px;
font-size:28px;
letter-spacing:3px;
}

/* menu */

.top-menu{
display:flex;
justify-content:center;
flex-wrap:wrap;
border-top:1px solid #333;
border-bottom:1px solid #333;
}

.menu-item{
padding:15px 30px;
cursor:pointer;
border-right:1px solid #333;
}

.menu-item:last-child{
border-right:none;
}

/* slider */

.slider{
width:90%;
margin:30px auto;
position:relative;
}

.slide{
display:none;
}

.slide img{
width:100%;
height:500px;
object-fit:cover;
}

.slide.active{
display:block;
}

/* arrows */

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
padding:10px;
}

.left{ left:10px }
.right{ right:10px }

/* dots */

.dots{
text-align:center;
margin-top:10px;
}

.dot{
height:10px;
width:10px;
background:white;
display:inline-block;
margin:5px;
border-radius:50%;
opacity:.4;
cursor:pointer;
}

.dot.active{
opacity:1;
}

/* mobile */

@media(max-width:700px){

.slide img{
height:250px;
}

.menu-item{
padding:12px;
font-size:14px;
}

.logo{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="logo">
NAHALA GAMES
</div>

<div class="top-menu">
<div class="menu-item">Home</div>
<div class="menu-item">About Us</div>
<div class="menu-item">The Games</div>
<div class="menu-item">Walkthrough</div>
<div class="menu-item">Contact Us</div>
</div>

<div class="slider">

<div class="slide active">
<img src="image1.jpg">
</div>

<div class="slide">
<img src="image2.jpg">
</div>

<div class="slide">
<img src="image3.jpg">
</div>

<div class="arrow left" onclick="prev()">❮</div>
<div class="arrow right" onclick="next()">❯</div>

<div class="dots">
<span class="dot active" onclick="go(0)"></span>
<span class="dot" onclick="go(1)"></span>
<span class="dot" onclick="go(2)"></span>
</div>

</div>

<script>

let index=0
let slides=document.querySelectorAll(".slide")
let dots=document.querySelectorAll(".dot")

function show(i){
slides.forEach(s=>s.classList.remove("active"))
dots.forEach(d=>d.classList.remove("active"))
slides[i].classList.add("active")
dots[i].classList.add("active")
index=i
}

function next(){
index++
if(index>=slides.length) index=0
show(index)
}

function prev(){
index--
if(index<0) index=slides.length-1
show(index)
}

/* auto slide */

setInterval(()=>{
next()
},4000)

</script>

</body>
</html>
